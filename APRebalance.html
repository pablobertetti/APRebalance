<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Rebalancer</title>
  <style>
    :root {
      --bg: #ede8df;
      --surface: #fffcf6;
      --surface-muted: #f6f1e8;
      --border: #d9ccbb;
      --border-strong: #b79d74;
      --text: #1e2a32;
      --muted: #697680;
      --accent: #174f72;
      --success: #2f6b3d;
      --success-soft: #ebf5ee;
      --danger: #a6452d;
      --danger-soft: #fbefeb;
      --warning-soft: #fff7de;
      --radius: 5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px 56px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .wordmark {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4a3f33;
    }
    .wordmark-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* Section divider */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Section head */
    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .section-num {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 5px;
      letter-spacing: .06em;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: #5a4e3f;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #4a3f33;
      letter-spacing: .02em;
      margin-bottom: 5px;
    }

    textarea, input[type=password], input[type=number] {
      width: 100%;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    textarea {
      min-height: 90px;
      padding: 9px 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.5;
    }
    input[type=password], input[type=number] {
      padding: 9px 10px;
    }
    textarea:focus, input[type=password]:focus, input[type=number]:focus, input[type=range]:focus {
      outline: none;
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px rgba(183, 157, 116, 0.14);
    }

    /* Full-width flat button — used for Parse and Generate */
    button {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .02em;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      transition: opacity 120ms ease;
    }
    button:hover:not(:disabled) { opacity: 0.88; }
    button:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-primary, .btn-rebalance {
      background: #1e2a32;
      color: #fff;
    }

    /* Inline status line */
    .status-line {
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }
    .status-line.ok    { color: var(--success); }
    .status-line.error { color: var(--danger); }
    .status-line.muted { color: var(--muted); }

    /* Error inline (api key) */
    .error-inline {
      min-height: 16px;
      color: var(--danger);
      font-size: 11px;
      margin-top: 3px;
    }

    /* Banner */
    .banner.error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #efc7bc;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
    }

    /* Coverage row */
    .coverage-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .coverage-row label { margin: 0; white-space: nowrap; }
    input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      height: 3px;
    }
    .coverage-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      min-width: 30px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Field layouts */
    .field-row { display: grid; gap: 5px; }
    .fields-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    /* AP table */
    .table-wrap {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      background: var(--surface);
      max-height: 240px;
    }
    .trade-table-wrap { max-height: 400px; margin-top: 0; }
    table {
      width: 100%;
      min-width: 400px;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      background: #f0ead9;
      color: #5a4e3f;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 6px 9px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 6px 9px;
      border-bottom: 1px solid rgba(217, 204, 187, 0.45);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: 0; }
    .numeric { text-align: right; font-variant-numeric: tabular-nums; }
    tr.excluded td { color: #9b907f; opacity: .55; }

    .ticker-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 3px 7px;
      border-radius: 3px;
      background: #ede5d8;
      border: 1px solid rgba(183, 157, 116, 0.35);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      color: #3a4b57;
    }
    .inline-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      border: 1px solid transparent;
      background: #f0ead9;
      color: #697680;
    }
    .inline-tag.active { background: #e4f0e8; border-color: #b8d9c0; color: var(--success); }
    .inline-tag.muted  { background: #f0ead9; color: #8a7b68; }

    .action-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      color: #fff;
    }
    .action-pill.buy  { background: #2f6b3d; }
    .action-pill.sell { background: #a6452d; }
    .trade-row-buy td  { background: #f5fbf6; color: #1e3d26; }
    .trade-row-sell td { background: #fdf4f2; color: #6b2316; }

    /* Result summary — 3 cols */
    .result-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric-card {
      text-align: center;
    }
    .metric-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .metric-value {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
    }
    .metric-value.green { color: var(--success); }
    .metric-value.red   { color: var(--danger); }

    .notice-row {
      margin: 0 0 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .notice-chip {
      display: inline-flex;
      align-items: center;
      background: var(--warning-soft);
      border: 1px solid #edd98f;
      border-radius: 3px;
      color: #8c6a00;
      font-size: 10px;
      padding: 2px 7px;
    }

    .empty-state, .loading-state {
      min-height: 140px;
      border: 1px dashed rgba(183, 157, 116, 0.5);
      border-radius: var(--radius);
      background: var(--surface-muted);
      display: grid;
      place-items: center;
      text-align: center;
      gap: 8px;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-state h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }
    .loading-state { min-height: 100px; }
    .loading-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      animation: pulse 1.2s infinite ease-out;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(23, 79, 114, 0.22); transform: scale(1); }
      70%  { box-shadow: 0 0 0 10px rgba(23, 79, 114, 0); transform: scale(1.1); }
      100% { box-shadow: 0 0 0 0 rgba(23, 79, 114, 0); transform: scale(1); }
    }

    /* trade-note hidden — JS still sets it, we just don't show it */
    .trade-note { display: none; }

    @media (max-width: 680px) {
      .container { padding: 20px 14px 40px; }
      .result-summary { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 420px) {
      .result-summary { grid-template-columns: 1fr 1fr; }
      .fields-2col { grid-template-columns: 1fr; }
    }
      color: var(--muted);
      font-size: 13px;
    }
    .notice-row {
      margin: 14px 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .notice-chip {
      background: var(--warning-soft);
      border-color: #edd98f;
      color: #8c6a00;
    }
    .empty-state, .loading-state {
      min-height: 220px;
      border: 1px dashed rgba(183, 157, 116, 0.65);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(246, 241, 232, 0.82));
      display: grid;
      place-items: center;
      text-align: center;
      gap: 12px;
      padding: 28px;
    }
    .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 300;
      color: var(--accent);
      background: rgba(23, 79, 114, 0.08);
      border: 1px solid rgba(23, 79, 114, 0.14);
      margin: 0 auto 8px;
    }
    .empty-state h3 {
      font-size: 24px;
      line-height: 1.05;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }
    .empty-state p, .loading {
      color: var(--muted);
      font-size: 14px;
      max-width: 42ch;
    }
    .loading-state { min-height: 180px; }
    .loading-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(23, 79, 114, 0.22);
      animation: pulse 1.2s infinite ease-out;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(23, 79, 114, 0.22); transform: scale(1); }
      70% { box-shadow: 0 0 0 16px rgba(23, 79, 114, 0); transform: scale(1.08); }
      100% { box-shadow: 0 0 0 0 rgba(23, 79, 114, 0); transform: scale(1); }
    }
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      .right-column .card { position: static; }
    }
    @media (max-width: 720px) {
      .container { padding: 24px 14px 36px; }
      .hero, .card { padding: 20px; }
      .card-head { flex-direction: column; align-items: start; }
      .slider-row { grid-template-columns: 1fr; }
      .field-grid { grid-template-columns: 1fr; }
      .metrics-grid, .result-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 2.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="app-header">
      <span class="wordmark">AP Rebalancer</span>
      <span class="wordmark-sub">Alpha Picks Workflow</span>
    </div>

    <!-- 01 Model -->
    <section id="ap-panel">
      <div class="section-head">
        <span class="section-num">01</span>
        <span class="section-title">Model</span>
      </div>

      <div class="field-row">
        <label for="ap-input">Alpha Picks dump</label>
        <textarea id="ap-input" placeholder="Paste the Alpha Picks portfolio dump here..."></textarea>
      </div>
      <button class="btn-primary" id="parse-btn">Parse</button>
      <div id="parse-status" class="status-line muted"></div>

      <div id="ap-table-container"></div>

      <div class="coverage-row" id="slider-row" style="display:none;">
        <label for="coverage-slider">Coverage</label>
        <input type="range" id="coverage-slider" min="1" max="100" value="75">
        <span class="coverage-value"><span id="coverage-display">75</span>%</span>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- 02 Portfolio & Settings -->
    <section id="portfolio-panel">
      <div class="section-head">
        <span class="section-num">02</span>
        <span class="section-title">Portfolio &amp; Settings</span>
      </div>

      <div class="field-row">
        <label for="portfolio-input">Holdings</label>
        <textarea id="portfolio-input" placeholder="AAPL, 10&#10;MSFT, 5&#10;GOOGL, 3"></textarea>
      </div>
      <div id="portfolio-status" class="status-line muted"></div>

      <div class="field-row" style="margin-top:12px;">
        <label for="api-key">Finnhub API key</label>
        <input type="password" id="api-key" placeholder="your-finnhub-api-key" autocomplete="off">
        <div id="api-key-error" class="error-inline"></div>
      </div>

      <div class="fields-2col">
        <div class="field-row">
          <label for="tolerance-input">Rebalance tolerance %</label>
          <input type="number" id="tolerance-input" min="0" max="10" step="0.5" value="0">
        </div>
        <div class="field-row">
          <label for="cash-adjustment">Cash ±$</label>
          <input type="number" id="cash-adjustment" value="0" step="100">
        </div>
      </div>

      <button class="btn-rebalance" id="rebalance-btn" disabled>Generate Rebalance Plan</button>
    </section>

    <div class="section-divider"></div>

    <!-- 03 Rebalance Plan -->
    <section id="trade-panel">
      <div class="section-head">
        <span class="section-num">03</span>
        <span class="section-title">Rebalance Plan</span>
      </div>
      <div class="trade-note" id="trade-note"><span>Waiting for a fresh rebalance run.</span></div>
      <div id="trade-content"></div>
    </section>

  </div>

<script>
// ── ap-parser.js ──
function parseAPDump(text) {
  const lines = text.split('\n').map(l => l.trim());

  // Find and skip header line (first line starting with "Company")
  let i = 0;
  while (i < lines.length && !lines[i].startsWith('Company')) i++;
  i++; // skip header

  const stockMap = {};

  while (i < lines.length) {
    // Skip blank lines between blocks
    if (!lines[i]) { i++; continue; }

    // Line 1: company name (skip)
    i++;
    if (i >= lines.length) break;

    // Line 2: company name repeated (skip)
    if (!lines[i]) { i++; continue; }
    i++;
    if (i >= lines.length) break;

    // Optional "Winner" badge
    if (lines[i] === 'Winner') {
      i++;
      if (i >= lines.length) break;
    }

    // Ticker + date line (tab-separated; ticker is first token)
    if (!lines[i]) { i++; continue; }
    const ticker = lines[i].split(/[\t\s]/)[0].toUpperCase();
    i++;
    if (i >= lines.length) break;

    // Return % line (skip)
    i++;
    if (i >= lines.length) break;

    // Sector + Rating + Holding% (tab-separated; weight is last token)
    const infoLine = lines[i++];
    const parts = infoLine.split('\t');
    const holdingStr = parts[parts.length - 1].trim();
    const weight = parseFloat(holdingStr.replace('%', ''));

    if (ticker && !isNaN(weight)) {
      stockMap[ticker] = (stockMap[ticker] || 0) + weight;
    }
  }

  return Object.entries(stockMap).map(([ticker, weight]) => ({ ticker, weight }));
}

if (typeof module !== 'undefined') module.exports = { parseAPDump };

// ── portfolio-parser.js ──
function parsePortfolio(text) {
  const lines = text.split('\n');
  const holdingMap = {};
  const errors = [];
  const validSharePattern = /^(?:\d+(?:\.\d+)?|\.\d+)$/;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    const parts = line.split(/[,;\t]|\s+/).map(p => p.trim()).filter(p => p.length > 0);
    if (parts.length < 2) {
      errors.push(`Line ${i + 1}: expected TICKER SHARES (comma, semicolon, tab, or space)`);
      continue;
    }

    const ticker = parts[0].toUpperCase();
    const sharesStr = parts[1];
    const shares = parseFloat(sharesStr);

    if (!ticker || !validSharePattern.test(sharesStr) || isNaN(shares) || shares < 0) {
      errors.push(`Line ${i + 1}: invalid ticker or share count`);
      continue;
    }

    holdingMap[ticker] = (holdingMap[ticker] || 0) + shares;
  }

  // Remove zero-share holdings
  for (const ticker of Object.keys(holdingMap)) {
    if (holdingMap[ticker] === 0) delete holdingMap[ticker];
  }

  return { holdings: holdingMap, errors };
}

function isValidPortfolio(text) {
  if (!text.trim()) return false;
  const { errors, holdings } = parsePortfolio(text);
  return errors.length === 0 && Object.keys(holdings).length > 0;
}

if (typeof module !== 'undefined') module.exports = { parsePortfolio, isValidPortfolio };

// ── rebalancer.js ──
function findNearestLotPlan(lots, targetCents, preferOvershoot) {
  if (targetCents <= 0 || lots.length === 0) return [];

  let maxValueCents = 0;
  for (const lot of lots) {
    maxValueCents = Math.max(maxValueCents, lot.valueCents);
  }

  const searchLimit = targetCents + maxValueCents;
  const prevSum = new Int32Array(searchLimit + 1);
  const prevLot = new Int32Array(searchLimit + 1);
  prevSum.fill(-1);
  prevLot.fill(-1);
  prevSum[0] = 0;

  for (let i = 0; i < lots.length; i++) {
    const lotValue = lots[i].valueCents;
    for (let sum = searchLimit - lotValue; sum >= 0; sum--) {
      if (prevSum[sum] === -1) continue;
      const next = sum + lotValue;
      if (prevSum[next] !== -1) continue;
      prevSum[next] = sum;
      prevLot[next] = i;
    }
  }

  let bestSum = -1;
  let bestDistance = Infinity;
  for (let sum = 0; sum <= searchLimit; sum++) {
    if (prevSum[sum] === -1) continue;
    const distance = Math.abs(sum - targetCents);
    if (
      distance < bestDistance ||
      (
        distance === bestDistance &&
        (
          (preferOvershoot && bestSum < targetCents && sum >= targetCents) ||
          (!preferOvershoot && bestSum > targetCents && sum <= targetCents)
        )
      )
    ) {
      bestSum = sum;
      bestDistance = distance;
    }
  }

  const selectedLots = [];
  while (bestSum > 0) {
    const lotIndex = prevLot[bestSum];
    selectedLots.push(lots[lotIndex]);
    bestSum = prevSum[bestSum];
  }

  return selectedLots;
}

function buildRemovalLots(trades, prices) {
  const lots = [];
  for (const trade of trades) {
    const priceCents = Math.round((prices[trade.ticker] || 0) * 100);
    if (priceCents <= 0 || trade.shares <= 0) continue;

    let remainingShares = trade.shares;
    let chunkSize = 1;
    while (remainingShares > 0) {
      const shares = Math.min(chunkSize, remainingShares);
      lots.push({ type: 'remove', ticker: trade.ticker, shares, valueCents: shares * priceCents });
      remainingShares -= shares;
      chunkSize *= 2;
    }
  }
  return lots;
}

function buildExtraBuyLots(trades, prices) {
  return trades
    .map((trade) => {
      const priceCents = Math.round((prices[trade.ticker] || 0) * 100);
      if (priceCents <= 0) return null;
      return { type: 'add', ticker: trade.ticker, shares: 1, valueCents: priceCents };
    })
    .filter(Boolean);
}

function sumSelectedShares(selectedLots) {
  const sharesByTicker = new Map();
  for (const lot of selectedLots) {
    sharesByTicker.set(lot.ticker, (sharesByTicker.get(lot.ticker) || 0) + lot.shares);
  }
  return sharesByTicker;
}

function rebalance(apStocks, coveragePercent, prices, holdings, tolerancePercent = 0, cashAdjustment = 0) {
  // Step 1: Sort by weight descending, filter to coverage threshold
  const sorted = [...apStocks].sort((a, b) => b.weight - a.weight);
  const totalAPWeight = sorted.reduce((sum, s) => sum + s.weight, 0);
  const threshold = (coveragePercent / 100) * totalAPWeight;

  let cumulative = 0;
  const activeModel = [];
  for (const stock of sorted) {
    cumulative += stock.weight;
    activeModel.push(stock);
    if (cumulative >= threshold) break;
  }

  // Step 2: Re-normalize selected weights to sum to 100
  const selectedWeightSum = activeModel.reduce((sum, s) => sum + s.weight, 0);
  const normalized = activeModel.map(s => ({
    ticker: s.ticker,
    normalizedWeight: (s.weight / selectedWeightSum) * 100,
  }));

  // Step 3: Total portfolio value (fixed; includes stocks to be sold)
  let totalValue = Object.entries(holdings).reduce((sum, [ticker, shares]) => {
    return sum + shares * (prices[ticker] || 0);
  }, 0);
  totalValue = Math.max(0, totalValue + cashAdjustment);

  // If totalValue is 0, no trades can be made
  if (totalValue === 0) {
    return { trades: [], droppedCount: 0, skippedCount: 0, totalValue, deployedValue: 0 };
  }

  // Step 4: Largest remainder method — compute floor shares and remainders
  const positions = normalized
    .map(({ ticker, normalizedWeight }) => {
      const price = prices[ticker];
      if (!price) return null;
      const exact = totalValue * (normalizedWeight / 100) / price;
      return { ticker, price, floor: Math.floor(exact), remainder: exact % 1 };
    })
    .filter(Boolean);

  let remainingCash = totalValue - positions.reduce((s, p) => s + p.floor * p.price, 0);

  const targetSharesMap = new Map(positions.map(p => [p.ticker, p.floor]));
  const byRemainder = [...positions].sort((a, b) => b.remainder - a.remainder);
  for (const pos of byRemainder) {
    if (pos.price <= remainingCash) {
      targetSharesMap.set(pos.ticker, pos.floor + 1);
      remainingCash -= pos.price;
    }
  }

  const modelTickers = new Set(normalized.map(s => s.ticker));
  const rawTrades = [];
  let skippedCount = 0;

  // Step 5: Compute trades for active model stocks
  for (const { ticker } of positions) {
    const price = prices[ticker];
    const targetShares = targetSharesMap.get(ticker);
    const currentShares = holdings[ticker] || 0;

    if (tolerancePercent > 0 && targetShares > 0) {
      const deviation = Math.abs(currentShares - targetShares) / targetShares;
      if (deviation <= tolerancePercent / 100) {
        skippedCount++;
        continue;
      }
    }

    const delta = targetShares - currentShares;
    if (delta !== 0) {
      rawTrades.push({
        ticker,
        action: delta > 0 ? 'BUY' : 'SELL',
        subtype: delta > 0 ? (currentShares === 0 ? 'open' : 'add') : 'trim',
        shares: Math.abs(delta),
        estValue: Math.abs(delta) * price,
      });
    }
  }

  // Step 7: Out-of-model holdings → SELL ALL
  for (const [ticker, shares] of Object.entries(holdings)) {
    if (!modelTickers.has(ticker) && shares > 0) {
      const price = prices[ticker] || 0;
      rawTrades.push({
        ticker,
        action: 'SELL',
        subtype: 'close',
        shares,
        estValue: shares * price,
      });
    }
  }

  // Cash-neutral adjustment: minimize net cash flow after whole-share rounding.
  // When tolerance skips trades, or whole-share constraints leave a mismatch,
  // adjust buys or trims so net cash is as close to zero as possible.
  const totalBuyValue = rawTrades.filter(t => t.action === 'BUY').reduce((s, t) => s + t.estValue, 0);
  const totalSellValue = rawTrades.filter(t => t.action === 'SELL').reduce((s, t) => s + t.estValue, 0);
  let cashDeficit = Math.round((totalBuyValue - totalSellValue - cashAdjustment) * 100) / 100;

  if (cashDeficit > 0) {
    const buyTrades = rawTrades.filter(t => t.action === 'BUY');
    const selectedLots = findNearestLotPlan(
      buildRemovalLots(buyTrades, prices),
      Math.round(cashDeficit * 100),
      true
    );
    const removalShares = sumSelectedShares(selectedLots);
    for (const trade of buyTrades) {
      const sharesToRemove = removalShares.get(trade.ticker) || 0;
      if (sharesToRemove <= 0) continue;
      const price = prices[trade.ticker];
      trade.shares -= sharesToRemove;
      trade.estValue -= sharesToRemove * price;
      targetSharesMap.set(trade.ticker, targetSharesMap.get(trade.ticker) - sharesToRemove);
    }
  } else if (cashDeficit < 0) {
    const trimTrades = rawTrades.filter(t => t.action === 'SELL' && t.subtype === 'trim');
    const buyTrades = rawTrades.filter(t => t.action === 'BUY');
    const trimRemovalLots = buildRemovalLots(trimTrades, prices);
    const extraBuyLots = buildExtraBuyLots(buyTrades, prices);
    const selectedLots = findNearestLotPlan(
      [...trimRemovalLots, ...extraBuyLots],
      Math.round(-cashDeficit * 100),
      false
    );
    const trimRemovalShares = sumSelectedShares(selectedLots.filter(lot => lot.type === 'remove'));
    const extraBuyShares = sumSelectedShares(selectedLots.filter(lot => lot.type === 'add'));

    for (const trade of trimTrades) {
      const sharesToRemove = trimRemovalShares.get(trade.ticker) || 0;
      if (sharesToRemove <= 0) continue;
      const price = prices[trade.ticker];
      trade.shares -= sharesToRemove;
      trade.estValue -= sharesToRemove * price;
      targetSharesMap.set(trade.ticker, targetSharesMap.get(trade.ticker) + sharesToRemove);
    }

    for (const trade of buyTrades) {
      const sharesToAdd = extraBuyShares.get(trade.ticker) || 0;
      if (sharesToAdd <= 0) continue;
      const price = prices[trade.ticker];
      trade.shares += sharesToAdd;
      trade.estValue += sharesToAdd * price;
      targetSharesMap.set(trade.ticker, targetSharesMap.get(trade.ticker) + sharesToAdd);
    }
  }

  // Filter sub-$1 trades
  const trades = [];
  let droppedCount = 0;
  for (const trade of rawTrades) {
    if (trade.estValue < 1) { droppedCount++; }
    else { trades.push(trade); }
  }

  // Deployed value: sum of (targetShares × price) for all model stocks
  const deployedValue = positions.reduce((sum, { ticker, price }) => {
    return sum + targetSharesMap.get(ticker) * price;
  }, 0);

  return { trades, droppedCount, skippedCount, totalValue, deployedValue };
}

if (typeof module !== 'undefined') module.exports = { rebalance };

// ── finnhub-provider.js ──
const FinnhubProvider = {
  /**
   * Fetch current prices for a list of tickers.
   * @param {string[]} tickers
   * @param {string} apiKey
   * @returns {Promise<Object>} map of ticker → price
   * @throws {Object} { type: 'invalid_key' | 'rate_limit' | 'http_error' | 'not_found', ... }
   */
  async getPrices(tickers, apiKey) {
    const fetchOne = async (ticker) => {
      const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${encodeURIComponent(apiKey)}`;
      const resp = await fetch(url);

      if (resp.status === 401 || resp.status === 403) {
        throw { type: 'invalid_key' };
      }
      if (resp.status === 429) {
        throw { type: 'rate_limit' };
      }
      if (!resp.ok) {
        throw { type: 'http_error', status: resp.status };
      }

      const data = await resp.json();
      return { ticker, price: data.c };
    };

    // Fetch all concurrently; Promise.all rejects on first HTTP error
    const results = await Promise.all(tickers.map(t => fetchOne(t)));

    // Validate all prices are non-zero/non-null (Finnhub returns c=0 for unknown tickers)
    const notFound = results
      .filter(r => r.price === 0 || r.price === null || r.price === undefined)
      .map(r => r.ticker);

    if (notFound.length > 0) {
      throw { type: 'not_found', tickers: notFound };
    }

    const priceMap = {};
    for (const { ticker, price } of results) {
      priceMap[ticker] = price;
    }
    return priceMap;
  },
};

if (typeof module !== 'undefined') module.exports = { FinnhubProvider };

// ── ui.js ──
// src/ui.js

// ── App State ──────────────────────────────────────────────────────────────
const state = {
  apStocks: null,       // [{ticker, weight}] post-dedup, weight-sorted
  holdings: null,       // {ticker: shares}
  isRebalanced: false,
};

function fmt(n) {
  return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}

function setStepState(stepId, variant, text) {
  const el = document.getElementById(stepId);
  if (!el) return;
  el.className = `step-badge ${variant}`;
  el.textContent = text;
}

function setTradeNote(html) {
  document.getElementById('trade-note').innerHTML = html;
}

function getAPCoverageStats(stocks, coveragePct) {
  if (!stocks || stocks.length === 0) {
    return { includedCount: 0, excludedCount: 0, coveredWeight: 0, totalWeight: 0 };
  }

  const totalWeight = stocks.reduce((sum, stock) => sum + stock.weight, 0);
  const threshold = (coveragePct / 100) * totalWeight;
  let cumulative = 0;
  let includedCount = 0;

  for (const stock of stocks) {
    if (cumulative < threshold) includedCount++;
    cumulative += stock.weight;
  }

  return {
    includedCount,
    excludedCount: Math.max(0, stocks.length - includedCount),
    coveredWeight: Math.min(cumulative, totalWeight),
    totalWeight,
  };
}

function renderTradeEmptyState(message, detail) {
  return `<div class="empty-state">
    <div class="empty-icon">+</div>
    <div>
      <h3>${message}</h3>
      <p>${detail}</p>
    </div>
  </div>`;
}

function clearTrades() {
  state.isRebalanced = false;
  document.getElementById('trade-content').innerHTML = renderTradeEmptyState(
    'Rebalance plan pending',
    'Parse the model and confirm your holdings to generate a rebalance plan.'
  );
  setTradeNote('<span>Waiting for a fresh rebalance run.</span>');
  setStepState('trade-step-badge', 'waiting', 'Waiting');
  updateRebalanceButton();
}

// ── Rebalance button enable logic ──────────────────────────────────────────
function updateRebalanceButton() {
  const btn = document.getElementById('rebalance-btn');
  const apiKey = document.getElementById('api-key').value.trim();
  btn.disabled = !(state.apStocks && state.holdings && apiKey);
}

// ── AP Panel ───────────────────────────────────────────────────────────────
function renderAPTable(stocks, coveragePct) {
  if (!stocks || stocks.length === 0) return '';

  const totalAPWeight = stocks.reduce((s, x) => s + x.weight, 0);
  const threshold = (coveragePct / 100) * totalAPWeight;

  let cumulative = 0;
  let rows = '';
  for (const { ticker, weight } of stocks) {
    cumulative += weight;
    const cumPct = (cumulative / totalAPWeight * 100).toFixed(1);
    const isExcluded = (cumulative - weight) >= threshold;
    rows += `<tr class="${isExcluded ? 'excluded' : ''}">
      <td><span class="ticker-chip">${ticker}</span></td>
      <td class="numeric">${weight.toFixed(2)}%</td>
      <td class="numeric">${cumPct}%</td>
      <td>${isExcluded ? '<span class="inline-tag muted">Excluded</span>' : '<span class="inline-tag active">Included</span>'}</td>
    </tr>`;
  }

  return `<div class="table-wrap">
    <table>
      <thead><tr><th>Ticker</th><th class="numeric">Weight</th><th class="numeric">Cumulative</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function updateAPSummary() {
  const coveragePct = parseInt(document.getElementById('coverage-slider').value, 10);
  document.getElementById('coverage-display').textContent = coveragePct;
}

function updateSliderGreying() {
  const coveragePct = parseInt(document.getElementById('coverage-slider').value, 10);
  if (!state.apStocks) return;

  const totalAPWeight = state.apStocks.reduce((s, x) => s + x.weight, 0);
  const threshold = (coveragePct / 100) * totalAPWeight;

  let cumulative = 0;
  const rows = document.querySelectorAll('#ap-table-container tbody tr');
  state.apStocks.forEach((stock, idx) => {
    cumulative += stock.weight;
    const isExcluded = (cumulative - stock.weight) >= threshold;
    rows[idx]?.classList.toggle('excluded', isExcluded);
  });

  const stats = getAPCoverageStats(state.apStocks, coveragePct);
  setTradeNote(
    `<span>Coverage includes ${stats.includedCount} name${stats.includedCount !== 1 ? 's' : ''}; ${stats.excludedCount} excluded below threshold.</span>`
  );
}

document.getElementById('parse-btn').addEventListener('click', () => {
  const text = document.getElementById('ap-input').value;
  const status = document.getElementById('parse-status');

  try {
    const stocks = parseAPDump(text);
    if (stocks.length === 0) throw new Error('No stocks found. Check the paste format.');
    stocks.sort((a, b) => b.weight - a.weight);
    state.apStocks = stocks;

    const coveragePct = parseInt(document.getElementById('coverage-slider').value, 10);
    document.getElementById('ap-table-container').innerHTML = renderAPTable(stocks, coveragePct);
    document.getElementById('slider-row').style.display = 'flex';
    updateAPSummary();
    updateSliderGreying();

    status.className = 'status-line ok';
    status.textContent = `✓ ${stocks.length} stocks parsed`;
    setStepState('ap-step-badge', 'ready', 'Ready');
    clearTrades();
  } catch (e) {
    status.className = 'status-line error';
    status.textContent = e.message;
    state.apStocks = null;
    document.getElementById('ap-table-container').innerHTML = '';
    document.getElementById('slider-row').style.display = 'none';
    updateAPSummary();
    setStepState('ap-step-badge', 'error', 'Needs Fix');
    clearTrades();
  }
});

const slider = document.getElementById('coverage-slider');
slider.addEventListener('input', () => {
  updateAPSummary();
  updateSliderGreying();
  clearTrades();
});

document.getElementById('tolerance-input').addEventListener('input', () => {
  clearTrades();
});

document.getElementById('cash-adjustment').addEventListener('input', () => {
  clearTrades();
});

// ── Portfolio Panel ────────────────────────────────────────────────────────
function updatePortfolioStatus() {
  const text = document.getElementById('portfolio-input').value;
  const statusEl = document.getElementById('portfolio-status');

  if (!text.trim()) {
    statusEl.className = 'status-line muted';
    statusEl.textContent = '';
    state.holdings = null;
    setStepState('portfolio-step-badge', 'waiting', 'Waiting');
    updateRebalanceButton();
    return;
  }

  const { holdings, errors } = parsePortfolio(text);

  if (errors.length > 0) {
    statusEl.className = 'status-line error';
    statusEl.textContent = errors[0];
    state.holdings = null;
    setStepState('portfolio-step-badge', 'error', 'Needs Fix');
  } else if (Object.keys(holdings).length === 0) {
    statusEl.className = 'status-line error';
    statusEl.textContent = 'No valid holdings found.';
    state.holdings = null;
    setStepState('portfolio-step-badge', 'error', 'Needs Fix');
  } else {
    const count = Object.keys(holdings).length;
    statusEl.className = 'status-line ok';
    statusEl.textContent = `✓ ${count} position${count !== 1 ? 's' : ''}`;
    state.holdings = holdings;
    setStepState('portfolio-step-badge', 'ready', 'Ready');
  }

  updateRebalanceButton();
}

document.getElementById('portfolio-input').addEventListener('input', () => {
  updatePortfolioStatus();
  clearTrades();
});

document.getElementById('api-key').addEventListener('input', () => {
  document.getElementById('api-key-error').textContent = '';
  updateRebalanceButton();
  if (state.isRebalanced) clearTrades();
});

// Persist API key in localStorage
const apiKeyInput = document.getElementById('api-key');
apiKeyInput.value = localStorage.getItem('finnhub_api_key') || '';
apiKeyInput.addEventListener('change', () => {
  localStorage.setItem('finnhub_api_key', apiKeyInput.value.trim());
});

// ── Trade Table Rendering ──────────────────────────────────────────────────
function renderTradeRows(list, cls) {
  const subtypeLabel = { open: 'Open', add: 'Add', trim: 'Trim', close: 'Close' };
  return list.map(t =>
    `<tr class="${cls}">
      <td><span class="ticker-chip">${t.ticker}</span></td>
      <td><span class="action-pill ${cls === 'trade-row-buy' ? 'buy' : 'sell'}">${t.action}</span></td>
      <td><span class="inline-tag">${subtypeLabel[t.subtype] || ''}</span></td>
      <td class="numeric">${t.shares.toLocaleString()}</td>
      <td class="numeric">${fmt(t.estValue)}</td>
    </tr>`
  ).join('');
}

function renderTrades({ trades, droppedCount, skippedCount, totalValue, deployedValue }) {
  if (trades.length === 0 && droppedCount === 0) {
    return `<div class="result-shell">
      <div class="result-summary">
        <div class="metric-card">
          <div class="metric-label">Buys</div>
          <strong class="metric-value green">${fmt(0)}</strong>
        </div>
        <div class="metric-card">
          <div class="metric-label">Sells</div>
          <strong class="metric-value red">${fmt(0)}</strong>
        </div>
        <div class="metric-card">
          <div class="metric-label">Portfolio value</div>
          <strong class="metric-value">${fmt(totalValue)}</strong>
        </div>
      </div>
      ${renderTradeEmptyState('Already balanced', 'The current holdings are already close enough to the target. No trades are needed.')}
    </div>`;
  }

  const buys = trades.filter(t => t.action === 'BUY').sort((a, b) => b.estValue - a.estValue);
  const sells = trades.filter(t => t.action === 'SELL').sort((a, b) => b.estValue - a.estValue);
  const totalBuy = buys.reduce((s, t) => s + t.estValue, 0);
  const totalSell = sells.reduce((s, t) => s + t.estValue, 0);

  const notices = [
    droppedCount > 0 ? `<div class="notice-chip">Ignored ${droppedCount} trade${droppedCount !== 1 ? 's' : ''} under $1.</div>` : '',
    skippedCount > 0 ? `<div class="notice-chip">Skipped ${skippedCount} trade${skippedCount !== 1 ? 's' : ''} within tolerance.</div>` : '',
  ].join('');

  return `<div class="result-shell">
    <div class="result-summary">
      <div class="metric-card">
        <div class="metric-label">Buys</div>
        <strong class="metric-value green">${fmt(totalBuy)}</strong>
      </div>
      <div class="metric-card">
        <div class="metric-label">Sells</div>
        <strong class="metric-value red">${fmt(totalSell)}</strong>
      </div>
      <div class="metric-card">
        <div class="metric-label">Portfolio value</div>
        <strong class="metric-value">${fmt(totalValue)}</strong>
      </div>
    </div>
    ${notices ? `<div class="notice-row">${notices}</div>` : ''}
    <div class="table-wrap trade-table-wrap">
      <table>
        <thead><tr><th>Ticker</th><th>Action</th><th>Type</th><th class="numeric">Shares</th><th class="numeric">Est. value</th></tr></thead>
        <tbody>
          ${renderTradeRows(buys, 'trade-row-buy')}
          ${renderTradeRows(sells, 'trade-row-sell')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function showError(html) {
  document.getElementById('trade-content').innerHTML = `<div class="banner error">${html}</div>`;
  setStepState('trade-step-badge', 'error', 'Error');
}

// ── Rebalance Button ───────────────────────────────────────────────────────
document.getElementById('rebalance-btn').addEventListener('click', async () => {
  const apiKey = document.getElementById('api-key').value.trim();
  const coveragePct = parseInt(document.getElementById('coverage-slider').value, 10);
  const btn = document.getElementById('rebalance-btn');
  const tradeContent = document.getElementById('trade-content');

  if (!state.apStocks || !state.holdings || !apiKey) return;

  btn.disabled = true;
  tradeContent.innerHTML = '<div class="loading-state"><div class="loading-dot"></div><p class="loading">Fetching live prices and building the trade plan...</p></div>';
  setStepState('trade-step-badge', 'working', 'Calculating');
  setTradeNote('<span>Requesting live quotes from Finnhub.</span>');

  const apTickers = state.apStocks.map(s => s.ticker);
  const portfolioTickers = Object.keys(state.holdings);
  const allTickers = [...new Set([...apTickers, ...portfolioTickers])];

  let prices;
  try {
    prices = await FinnhubProvider.getPrices(allTickers, apiKey);
  } catch (err) {
    if (err.type === 'invalid_key') {
      showError('Invalid API key. Check your Finnhub key and try again.');
      document.getElementById('api-key-error').textContent = 'Invalid key';
    } else if (err.type === 'rate_limit') {
      showError('Rate limit exceeded. Wait a moment and try again.');
    } else if (err.type === 'not_found') {
      showError(`Tickers not found: <strong>${err.tickers.join(', ')}</strong>. Check ticker symbols.`);
    } else {
      showError(`Price fetch failed (HTTP ${err.status || 'error'}). Try again.`);
    }
    btn.disabled = false;
    return;
  }

  const tolerancePct = parseFloat(document.getElementById('tolerance-input').value) || 0;
  const cashAdj = parseFloat(document.getElementById('cash-adjustment').value) || 0;
  const result = rebalance(state.apStocks, coveragePct, prices, state.holdings, tolerancePct, cashAdj);
  tradeContent.innerHTML = renderTrades(result);
  state.isRebalanced = true;
  btn.disabled = false;
  setStepState('trade-step-badge', 'ready', 'Calculated');
  setTradeNote('<span>Rebalance plan reflects current coverage, tolerance, and cash settings.</span>');
  updateRebalanceButton();
});

updateAPSummary();
updatePortfolioStatus();
clearTrades();
updateRebalanceButton();
</script>
